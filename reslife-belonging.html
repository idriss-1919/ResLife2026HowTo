<style>
  :root {
    --navy: #003B5C;

    --bg: #F6F7F9;
    --line: #E5E7EB;
    --ink: #111827;
    --ink-soft: #4B5563;
    --neutral: #FFFFFF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .tab-bar {
    display: flex;
    background: var(--navy-deep);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 24px;
    gap: 2px;
    flex-shrink: 0;
    align-items: stretch;
    overflow-x: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 11.5px;
    padding-right: 20px;
    margin-right: 16px;
    border-right: 1px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
  }

  .tab-group-sep {
    width: 1px;
    background: rgba(255,255,255,0.12);
    margin: 10px 6px;
    flex-shrink: 0;
  }

  .tab {
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 14px 18px;
    cursor: pointer;
    position: relative;
    transition: color 0.15s ease, background 0.15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tab:hover {
    color: #fff;
    background: rgba(255,255,255,0.04);
  }

  .tab .pillar-icon {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .tab .pillar-icon svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tab[data-tab="framework"] .pillar-icon,
  .tab[data-tab="modules"]   .pillar-icon {
    color: rgba(255,255,255,0.6);
  }
  .tab[data-tab="framework"].active .pillar-icon,
  .tab[data-tab="modules"].active   .pillar-icon {
    color: #fff;
  }
  .tab[data-tab="welcomes"] .pillar-icon { color: var(--welcomes); }
  .tab[data-tab="connects"] .pillar-icon { color: var(--magenta); }
  .tab[data-tab="responds"] .pillar-icon { color: var(--gold); }

  .tab.active {
    color: #fff;
    background: rgba(255,255,255,0.06);
  }

  .tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 3px;
  }

  .tab[data-tab="framework"].active::after,
  .tab[data-tab="modules"].active::after   { background: #fff; }
  .tab[data-tab="welcomes"].active::after  { background: var(--welcomes); }
  .tab[data-tab="connects"].active::after  { background: var(--magenta); }
  .tab[data-tab="responds"].active::after  { background: var(--gold); }

  .frame-stage {
    flex: 1;
    position: relative;
    background: #fff;
    overflow: hidden;
  }

  iframe.pillar-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
    background: #fff;
  }

  iframe.pillar-frame.active {
    display: block;
  }

  @media (max-width: 900px) {
    .tab-bar { padding: 0 12px; }
    .brand { display: none; }
    .tab { padding: 12px 12px; font-size: 12.5px; }
  }

  @media (max-width: 480px) {
    .tab-bar { padding: 0 8px; }
    .tab { padding: 11px 8px; font-size: 11.5px; gap: 6px; }
    .tab .pillar-icon, .tab .pillar-icon svg { width: 14px; height: 14px; }
    .tab-group-sep { margin: 8px 4px; }
  }
</style>

<style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body { background: var(--white); color: var(--ink); font-family: var(--body); font-weight: 400; line-height: 1.6; }

/* topbar */
.topbar {
  border-bottom: 1px solid var(--line);
  padding: 0 var(--s-5);
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.brand {
  font-size: var(--t-xs);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink);
}

.page { max-width: 960px; margin: 0 auto; padding: var(--s-7) var(--s-5) var(--s-7); }
@media (max-width: 720px) { .page { padding: var(--s-5) var(--s-3) var(--s-6); } .topbar { padding: 0 var(--s-3); } }

.eyebrow {
  font-size: var(--t-xs);
  font-weight: 500;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--sub);
  margin-bottom: var(--s-2);
}

/* hero */
.hero h1 {
  font-family: var(--display);
  font-size: var(--t-xl);
  font-weight: 700;
  line-height: 1.1;
  letter-spacing: -0.02em;
  color: var(--ink);
  margin-bottom: var(--s-3);
  white-space: nowrap;
}
@media (max-width: 720px) { .hero h1 { white-space: normal; } }
.hero p { font-size: var(--t-base); line-height: 1.65; color: var(--sub); max-width: 600px; }
@media (max-width: 720px) { .hero h1 { font-size: var(--t-2xl); } }

/* section divider */
.section-rule { display: flex; align-items: center; gap: var(--s-3); margin: var(--s-6) 0 var(--s-3); }
.section-rule .line { flex: 1; height: 1px; background: var(--line); }
.section-rule .label { font-size: var(--t-xs); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); white-space: nowrap; }
@media (max-width: 720px) { .section-rule { margin: var(--s-5) 0 var(--s-3); gap: var(--s-2); } .section-rule .label { white-space: normal; text-align: center; } }

.section-head { margin-bottom: var(--s-4); max-width: 720px; }
.section-head h2 { font-family: var(--display); font-size: var(--t-2xl); font-weight: 700; line-height: 1.15; letter-spacing: -0.015em; color: var(--ink); margin-bottom: var(--s-2); }
.section-head p { font-size: var(--t-base); color: var(--sub); line-height: 1.65; max-width: 600px; }
.section-meta { font-size: var(--t-sm); color: var(--sub); margin-top: var(--s-2); }
@media (max-width: 720px) { .section-head h2 { font-size: var(--t-lg); } }

/* triad — three-card row */
.triad { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-2); }
.triad .card {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--s-3);
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}
.triad .card .tag { font-size: var(--t-xs); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); }
.triad .card .card-label { font-size: var(--t-sm); font-weight: 500; color: var(--sub); padding-bottom: var(--s-2); border-bottom: 1px dashed var(--line); }
.triad .card h3 { font-family: var(--display); font-size: var(--t-lg); font-weight: 700; line-height: 1.3; color: var(--ink); letter-spacing: -0.01em; }
@media (max-width: 900px) { .triad { grid-template-columns: 1fr; } }

/* RAISE / step grid (5-up on desktop) */
.values-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--s-2); }
.values-grid .step {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--s-3);
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
  transition: background var(--ease-base);
}
.values-grid .step:hover { background: var(--gray); }
.step-head { display: flex; align-items: baseline; gap: var(--s-2); padding-bottom: var(--s-2); border-bottom: 1px dashed var(--line); }
.step-letter { font-family: var(--display); font-size: var(--t-xl); font-weight: 700; line-height: 1; letter-spacing: -0.04em; color: var(--ink); }
.step-name { font-family: var(--display); font-size: var(--t-lg); font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.step-desc { font-size: var(--t-sm); color: var(--sub); line-height: 1.55; }
@media (max-width: 900px) { .values-grid { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 560px) { .values-grid { grid-template-columns: repeat(2, 1fr); } }

/* pathways (2-col comparison) */
.pathways { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); }
.pathway {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--s-4);
  display: flex;
  flex-direction: column;
  gap: var(--s-3);
}
.pathway .tag { font-size: var(--t-xs); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); }
.pathway h3 { font-family: var(--display); font-size: var(--t-lg); font-weight: 700; color: var(--ink); line-height: 1.25; }
.pathway p { font-size: var(--t-base); color: var(--sub); line-height: 1.6; }
.pathway .examples-label { font-size: var(--t-xs); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); padding-top: var(--s-2); border-top: 1px dashed var(--line); }
.pathway ul { list-style: none; display: flex; flex-direction: column; gap: var(--s-2); }
.pathway ul.numbered li { display: grid; grid-template-columns: 28px 1fr; gap: var(--s-1); font-size: var(--t-sm); color: var(--sub); line-height: 1.5; align-items: start; }
.pathway ul.numbered li .num { font-family: var(--display); font-size: var(--t-sm); font-weight: 700; color: var(--ink); letter-spacing: 0.04em; }
.pathway ul.numbered li strong { font-weight: 600; color: var(--ink); }

.pathway ul.iconed li { display: grid; grid-template-columns: 24px 1fr; gap: var(--s-2); font-size: var(--t-sm); color: var(--sub); line-height: 1.5; align-items: start; }
.pathway ul.iconed li .icon { width: 20px; height: 20px; color: var(--ink); display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; padding-top: 1px; }
.pathway ul.iconed li .icon svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.pathway ul.iconed li strong { font-weight: 600; color: var(--ink); }
@media (max-width: 720px) { .pathways { grid-template-columns: 1fr; } .pathway { padding: var(--s-3); } }

/* units grid (10 cards) */
.units { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); }
.unit {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--s-3);
  display: flex;
  flex-direction: column;
  gap: var(--s-2);
}
.unit-head { display: flex; align-items: baseline; gap: var(--s-2); padding-bottom: var(--s-2); border-bottom: 1px dashed var(--line); }
.unit-code { font-family: var(--display); font-size: var(--t-xs); font-weight: 700; letter-spacing: 0.12em; color: var(--ink); padding: 3px 8px; border: 1px solid var(--line); border-radius: var(--r-sm); }
.unit h3 { font-family: var(--display); font-size: var(--t-base); font-weight: 600; color: var(--ink); line-height: 1.3; }
.unit p { font-size: var(--t-sm); color: var(--sub); line-height: 1.55; }
@media (max-width: 720px) { .units { grid-template-columns: 1fr; } }

/* places */
.places { display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: auto auto; gap: var(--s-2); }
.place {
  background: var(--white);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  padding: var(--s-3);
  display: grid;
  grid-template-rows: subgrid;
  grid-row: span 2;
  gap: var(--s-2);
}
.place-head { display: flex; flex-direction: column; gap: 4px; }
.place h3 { font-family: var(--display); font-size: var(--t-lg); font-weight: 700; color: var(--ink); letter-spacing: -0.01em; }
.place .area { font-size: var(--t-xs); font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--sub); min-height: 2.4em; line-height: 1.4; }
.place-stat { display: flex; flex-direction: column; gap: 2px; padding: var(--s-2) 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.place .place-stat:last-child { border-bottom: none; padding-bottom: 0; }
.place-stat .num { font-family: var(--display); font-size: var(--t-2xl); font-weight: 700; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
.place-stat .num-label { font-size: var(--t-sm); color: var(--sub); }
.place-residents { font-size: var(--t-sm); color: var(--sub); line-height: 1.5; }

.stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--s-2); }
.stats-row .stat { background: var(--white); border: 1px solid var(--line); border-radius: var(--r-md); padding: var(--s-3); display: flex; flex-direction: column; gap: 4px; }
.stats-row .stat-num { font-family: var(--display); font-size: var(--t-2xl); font-weight: 700; line-height: 1; letter-spacing: -0.02em; color: var(--ink); }
.stats-row .stat-label { font-size: var(--t-sm); color: var(--sub); }

@media (max-width: 560px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }

.footer { margin-top: var(--s-7); padding-top: var(--s-3); border-top: 1px solid var(--line); display: flex; flex-wrap: wrap; align-items: center; gap: var(--s-2); font-size: var(--t-sm); color: var(--sub); }
.footer a { color: var(--ink); text-decoration: none; font-weight: 500; transition: color var(--ease); }
.footer a:hover { color: var(--sub); }

@media (max-width: 560px) { .footer { flex-direction: column; align-items: flex-start; gap: var(--s-1); } .footer .right { margin-left: 0; } }

<style>/* ═══════════════════════════════════════════════════════════════
   UCLA Residential Life — Colors &amp; Type
   Minimalist training design system. One family. Three surfaces.
   Three pillar colors. Every value passes WCAG AA.
   ═══════════════════════════════════════════════════════════════ */

/* ─── Webfonts (Karbon) ────────────────────────────────────────── */
@font-face { font-family: 'Karbon'; src: local('Karbon Regular'), local('Karbon'); font-weight: 400; font-style: normal; font-display: swap; }
@font-face { font-family: 'Karbon'; src: local('Karbon Medium');                       font-weight: 500; font-style: normal; font-display: swap; }
@font-face { font-family: 'Karbon'; src: local('Karbon Semibold');                     font-weight: 600; font-style: normal; font-display: swap; }
@font-face { font-family: 'Karbon'; src: local('Karbon Bold');                         font-weight: 700; font-style: normal; font-display: swap; }
:root {
  /* ── SURFACES — three only ───────────────────────────────────── */
  --white:  #FFFFFF;   /* content surface */
  --gray:   #F4F4F3;   /* warm container / hover */
  --blue:   #005587;   /* dark emphasis surface */

  /* ── TEXT — two values (WCAG AAA on white &amp; gray) ────────────── */
  --ink:    #005587;   /* primary text — 7.9:1 on white */
  --sub:    #595959;   /* secondary text — 7.0:1 on white */

  /* Dark-surface text (on #005587) */
  --dark-body: #F1F1F1; /* 7.0:1 on blue — AAA */
  --dark-sub:  #C4C4C4; /* 4.5:1 on blue — AA  */

  /* ── BORDER — one value ──────────────────────────────────────── */
  --line:   #E0E0E0;

  /* ── PILLAR COLORS — inline emphasis only ────────────────────────
     Pillar colors NEVER appear as page backgrounds, card tops, left
     borders, full track headers, button fills, or chrome. They appear
     ONLY as:
       (a) the pillar mark glyph (■ ● ▲) at icon scale, OR
       (b) a tight inline highlight wrapping a single word or short
           phrase: solid background + white text, ~10px horizontal
           padding, --r-sm radius, in a heading or lede.
     One highlight per surface. The word being highlighted is the
     ONE idea on the surface.
  ───────────────────────────────────────────────────────────────── */
  --welcomes:         #2774AE;   /* Pillar 1 — inline highlight + mark */
  --connects:         #D900A5;   /* Pillar 2 — inline highlight + mark */
  --responds:         #FFD100;   /* Pillar 3 — inline highlight + mark */
  --responds-text:    #8C7200;   /* gold as text on white — 4.6:1 (AA), use only when gold itself must read as text */

  /* Highlighted-word foreground colors (text inside the inline box) */
  --on-welcomes:      #FFFFFF;   /* white reads on Welcomes blue */
  --on-connects:      #FFFFFF;   /* white reads on Connects magenta */
  --on-responds:      #005587;   /* ink reads on Responds gold (gold is too light for white) */

  /* ── SEMANTIC (data visualization only) ──────────────────────── */
  --success: #1A7F37;
  --warning: #D4A017;
  --error:   #CF222E;

  /* ── TYPE — one family, four roles ───────────────────────────── */
  --display: 'Karbon', Georgia, serif;
  --body:    'Karbon', system-ui, -apple-system, sans-serif;
  --label:   'Karbon', system-ui, sans-serif;
  --mono:    'Karbon', 'SF Mono', 'Courier New', monospace;

  /* ── SCALE — six sizes ───────────────────────────────────────── */
  --t-xs:   0.75rem;   /* 12 — labels, captions */
  --t-sm:   0.875rem;  /* 14 — small body, metadata */
  --t-base: 1rem;      /* 16 — body */
  --t-lg:   1.375rem;  /* 22 — subheads */
  --t-2xl:  1.875rem;  /* 30 — featured stats / large callouts */
  --t-xl:   2.5rem;    /* 40 — display / H1 / cover slides */

  /* ── SPACING — 8px base, seven steps ─────────────────────────── */
  --s-1: 0.5rem;   /*  8 */
  --s-2: 1rem;     /* 16 */
  --s-3: 1.5rem;   /* 24 */
  --s-4: 2rem;     /* 32 */
  --s-5: 3rem;     /* 48 */
  --s-6: 4rem;     /* 64 */
  --s-7: 6rem;     /* 96 */

  /* ── RADIUS — three values mapped to component size ──────────── */
  --r-sm: 4px;   /* tags, chips, inline badges, progress bars */
  --r-md: 8px;   /* cards, buttons, inputs, notes, module containers */
  --r-lg: 16px;  /* modals, drawers, full-bleed panels, poster frames, dark surfaces */
  --r:    4px;   /* backward-compat alias for --r-sm */

  /* ── MOTION — one ease per speed tier ────────────────────────── */
  --ease:       150ms ease-out;                           /* default interactive */
  --ease-fast:  100ms ease-out;                           /* hover, micro */
  --ease-base:  200ms ease-out;                           /* standard transition */
  --ease-slow:  400ms cubic-bezier(0.16, 1, 0.3, 1);      /* emphasis reveal */
  --ease-enter: 300ms cubic-bezier(0, 0, 0.2, 1);         /* element entry */
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { transition-duration: 0ms !important; animation-duration: 0ms !important; }
}

/* ═══ SEMANTIC ROLES ═══════════════════════════════════════════ */

html { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  font-family: var(--body);

/* Default element mapping (use when you want to write plain HTML) */
h1 { font-family: var(--display); font-size: var(--t-xl); font-weight: 700; line-height: 1.1; letter-spacing: -0.02em; color: var(--ink); }
h2 { font-family: var(--display); font-size: var(--t-lg); font-weight: 700; line-height: 1.25; color: var(--ink); }

/* Focus ring — ink by default; pillar contexts override */
:focus-visible {
  outline: 2px solid var(--ink);
  outline-offset: 2px;
}

/* ═══ PILLAR HIGHLIGHT — the only place pillar color touches a surface ═══
   Wrap a single word or short phrase in a heading or lede with one of:
     <span class=&quot;hl hl-welcomes&quot;>word</span>
     <span class=&quot;hl hl-connects&quot;>word</span>
     <span class=&quot;hl hl-responds&quot;>word</span>
   One highlight per surface. Used as inline emphasis, never as chrome.
*/
/* Solid-fill inline highlight.
   Tight vertical padding lets ascenders/descenders breach the box —
   reads as editorial emphasis, not a pill sticker.
*/
.hl {
  display: inline;
  padding: 0.04em 0.28em 0.08em;
  border-radius: 3px;
  box-decoration-break: clone;
  -webkit-box-decoration-break: clone;
  font-weight: inherit;
}
.hl-welcomes { background: var(--welcomes); color: var(--on-welcomes); }
.hl-connects { background: var(--connects); color: var(--on-connects); }
.hl-responds { background: var(--responds); color: var(--on-responds); }

/* Underline-only form. A flat pillar-color stripe behind the baseline
   of a single word — same intent as the highlight (one word, one idea),
   but lighter visual weight. Use when a heading already carries a solid
   highlight and a second emphasis is needed; or in body copy where a
   solid box would feel too loud.
   <span class=&quot;ul ul-responds&quot;>show up</span>
*/
.ul {
  background-image: linear-gradient(to top, currentColor 0, currentColor 0.18em, transparent 0.18em);
  background-repeat: no-repeat;
  background-position: 0 100%;
  padding-bottom: 0.04em;
  color: inherit;       /* text color stays as inherited */
}
.ul-welcomes { background-image: linear-gradient(to top, var(--welcomes) 0, var(--welcomes) 0.18em, transparent 0.18em); }
.ul-connects { background-image: linear-gradient(to top, var(--connects) 0, var(--connects) 0.18em, transparent 0.18em); }
.ul-responds { background-image: linear-gradient(to top, var(--responds) 0, var(--responds) 0.18em, transparent 0.18em); }

/* Pillar mark — the glyph itself, sized to the type around it.
   Use beside a pillar name: <span class=&quot;mark mark-welcomes&quot;>■</span> ResLife Welcomes

   Per-glyph optical sizing: ▲ renders larger than ■ ● at the same
   font-size; ● is slightly smaller-feeling than ■. These overrides
   even out the visual rhythm.
*/
.mark            { font-style: normal; line-height: 1; display: inline-block; }
.mark-welcomes   { color: var(--welcomes); font-size: 1em;     transform: translateY(-0.05em); }
.mark-connects   { color: var(--connects); font-size: 1.05em;  transform: translateY(-0.05em); }
.mark-responds   { color: var(--responds); font-size: 0.82em;  transform: translateY(0.04em); }

  <script>
    (function () {
      var tabs = document.querySelectorAll('.tab');
      var frames = document.querySelectorAll('.pillar-frame');
      var valid = ['welcomes','connects','responds','framework','modules'];

      function show(name) {
        tabs.forEach(function (t) {
          var active = t.dataset.tab === name;
          t.classList.toggle('active', active);
          t.setAttribute('aria-selected', active ? 'true' : 'false');
          if (active && t.scrollIntoView) {
            try { t.scrollIntoView({ inline: 'center', block: 'nearest', behavior: 'smooth' }); } catch (e) {}
          }
        });
        frames.forEach(function (f) {
          f.classList.toggle('active', f.dataset.frame === name);
        });
        if (history.replaceState) history.replaceState(null, '', '#' + name);
      }

      tabs.forEach(function (t) {
        t.addEventListener('click', function () { show(t.dataset.tab); });
      });

      var initial = (location.hash || '').replace('#', '');
      if (valid.indexOf(initial) !== -1) show(initial);
    })();
  </script>
