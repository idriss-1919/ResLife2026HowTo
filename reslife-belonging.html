<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UCLA ResLife · Belonging & Training Framework</title>
<style>
  :root {
    --navy: #003B5C;
    --navy-deep: #002437;
    --welcomes: #2774AE;
    --magenta: #D900A5;
    --gold: #FFD100;
    --bg: #F6F7F9;
    --line: #E5E7EB;
    --ink: #111827;
    --ink-soft: #4B5563;
    --neutral: #FFFFFF;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
  }

  .shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .tab-bar {
    display: flex;
    background: var(--navy-deep);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    padding: 0 24px;
    gap: 2px;
    flex-shrink: 0;
    align-items: stretch;
    overflow-x: auto;
  }

  .brand {
    display: flex;
    align-items: center;
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-size: 11.5px;
    padding-right: 20px;
    margin-right: 16px;
    border-right: 1px solid rgba(255,255,255,0.12);
    flex-shrink: 0;
  }

  .tab-group-sep {
    width: 1px;
    background: rgba(255,255,255,0.12);
    margin: 10px 6px;
    flex-shrink: 0;
  }

  .tab {
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.65);
    font-family: inherit;
    font-size: 13.5px;
    font-weight: 600;
    letter-spacing: 0.01em;
    padding: 14px 18px;
    cursor: pointer;
    position: relative;
    transition: color 0.15s ease, background 0.15s ease;
    display: flex;
    align-items: center;
    gap: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .tab:hover {
    color: #fff;
    background: rgba(255,255,255,0.04);
  }

  .tab .pillar-icon {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .tab .pillar-icon svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .tab[data-tab="framework"] .pillar-icon,
  .tab[data-tab="modules"]   .pillar-icon {
    color: rgba(255,255,255,0.6);
  }
  .tab[data-tab="framework"].active .pillar-icon,
  .tab[data-tab="modules"].active   .pillar-icon {
    color: #fff;
  }
  .tab[data-tab="welcomes"] .pillar-icon { color: var(--welcomes); }
  .tab[data-tab="connects"] .pillar-icon { color: var(--magenta); }
  .tab[data-tab="responds"] .pillar-icon { color: var(--gold); }

  .tab.active {
    color: #fff;
    background: rgba(255,255,255,0.06);
  }

  .tab.active::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 3px;
  }

  .tab[data-tab="framework"].active::after,
  .tab[data-tab="modules"].active::after   { background: #fff; }
  .tab[data-tab="welcomes"].active::after  { background: var(--welcomes); }
  .tab[data-tab="connects"].active::after  { background: var(--magenta); }
  .tab[data-tab="responds"].active::after  { background: var(--gold); }

  .frame-stage {
    flex: 1;
    position: relative;
    background: #fff;
    overflow: hidden;
  }

  iframe.pillar-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    border: 0;
    display: none;
    background: #fff;
  }

  iframe.pillar-frame.active {
    display: block;
  }

  @media (max-width: 900px) {
    .tab-bar { padding: 0 12px; }
    .brand { display: none; }
    .tab { padding: 12px 12px; font-size: 12.5px; }
  }
</style>
</head>
<body>

    <nav class="tab-bar" role="tablist" aria-label="ResLife navigation">
      <div class="brand">UCLA ResLife</div>

      <button class="tab active" data-tab="framework" role="tab" aria-selected="true">
        <span class="pillar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </span>
        Framework
      </button>
      <button class="tab" data-tab="modules" role="tab" aria-selected="false">

        </span>
        Modules
      </button>

      <div class="tab-group-sep" aria-hidden="true"></div>

      <button class="tab" data-tab="welcomes" role="tab" aria-selected="false">
        <span class="pillar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="4" width="16" height="16" rx="1.5"/></svg>
        </span>
        Welcomes
      </button>
      <button class="tab" data-tab="connects" role="tab" aria-selected="false">
        <span class="pillar-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="8"/></svg>
        </span>

      </button>
      <button class="tab" data-tab="responds" role="tab" aria-selected="false">

        </span>
        Responds
      </button>
    </nav>

    <div class="frame-stage">
      <iframe class="pillar-frame active" data-frame="framework" title="Framework" srcdoc="<!DOCTYPE html>
<html lang=&quot;en&quot;>
<head>
<meta charset=&quot;UTF-8&quot; />
<meta name=&quot;viewport&quot; content=&quot;width=device-width, initial-scale=1.0&quot; />
<title>The Framework · UCLA ResLife 2026 Onboarding</title>
<link href=&quot;https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&amp;display=swap&quot; rel=&quot;stylesheet&quot;>
<style>
  @font-face { font-family:'Karbon'; src:local('Karbon Bold');      font-weight:700; font-style:normal; }
  @font-face { font-family:'Karbon'; src:local('Karbon Semibold');  font-weight:600; font-style:normal; }
  @font-face { font-family:'Karbon'; src:local('Karbon Medium');    font-weight:500; font-style:normal; }
  @font-face { font-family:'Karbon'; src:local('Karbon Regular'),local('Karbon'); font-weight:400; font-style:normal; }

  :root{
    /* SURFACES */
    --white:#FFFFFF;
    --gray:#F4F4F3;
    --blue:#005587;

    /* TEXT */
    --ink:#005587;
    --sub:#595959;

    /* BORDER */
    --line:#E0E0E0;

    /* PILLARS */
    --welcomes:#2774AE;
    --connects:#D900A5;
    --responds:#FFD100;
    --responds-text:#8C7200;

    /* DARK SURFACE TEXT */
    --dark-body:#F1F1F1;
    --dark-sub:#C4C4C4;

    /* TYPE */
    --display:'Karbon', system-ui, -apple-system, sans-serif;
    --body:'Karbon', system-ui, -apple-system, sans-serif;
    --label:'Karbon', system-ui, sans-serif;

    /* SCALE */
    --t-xs:0.75rem;    /* 12 */
    --t-sm:0.875rem;   /* 14 */
    --t-base:1rem;     /* 16 */
    --t-lg:1.375rem;   /* 22 */
    --t-2xl:1.875rem;  /* 30 */
    --t-xl:2.5rem;     /* 40 */

    /* RADIUS */
    --r-sm:4px;
    --r-md:8px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
  body{
    font-family:var(--body);
    font-weight:400;
    font-size:var(--t-base);
    line-height:1.6;
    color:var(--ink);
    background:var(--white);
  }
  .page{
    max-width:1040px;
    margin:0 auto;
    padding:56px 56px 40px;
  }

  /* ===== HEADER ===== */
  .hdr{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    padding-bottom:28px;
    border-bottom:1px solid var(--line);
    margin-bottom:44px;
  }
  .hdr-left .eyebrow{
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:500;
    margin-bottom:8px;
  }
  .hdr-left h1{
    font-family:var(--display);
    font-size:var(--t-xl);
    line-height:1.1;
    color:var(--ink);
    margin:0;
    font-weight:700;
    letter-spacing:-.02em;
  }
  .hdr-tag{
    font-family:var(--display);
    font-size:var(--t-base);
    color:var(--sub);
    font-weight:400;
    font-style:italic;
    margin-top:8px;
    line-height:1.4;
  }
  .hdr-right{
    text-align:right;
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:500;
    line-height:1.7;
    padding-top:8px;
  }

  /* ===== SECTION ===== */
  section{margin-bottom:48px}
  .sec-head{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:18px;
  }
  .sec-title{
    font-family:var(--display);
    font-size:var(--t-lg);
    color:var(--ink);
    font-weight:700;
    margin:0;
    line-height:1.25;
  }
  .sec-label{
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:500;
  }
  .sec-sub{
    color:var(--sub);
    font-size:var(--t-base);
    line-height:1.65;
    margin:-6px 0 18px;
    max-width:720px;
  }

  /* ===== GRIDS ===== */
  .grid-3{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:14px;
  }
  .grid-2{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:14px;
  }

  /* ===== PILLAR CARDS (Three Pillars) ===== */
  .pillars-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:0;
    border-radius:4px;
    overflow:hidden;
  }
  .pillar{
    padding:34px 30px 36px;
    position:relative;
    min-height:320px;
    display:flex;
    flex-direction:column;
  }
  .pillar.w{background:var(--welcomes);color:#fff}
  .pillar.c{background:var(--connects);color:#fff}
  .pillar.r{background:var(--responds);color:#111}
  .pillar h3{
    font-family:var(--display);
    font-size:var(--t-xl);
    line-height:1.05;
    margin:0 0 14px;
    font-weight:700;
    letter-spacing:-.02em;
  }
  .pillar .tagline{
    font-size:var(--t-base);
    font-weight:500;
    margin:0 0 22px;
    line-height:1.5;
  }
  .pillar .cat{
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    font-weight:600;
    margin:0 0 12px;
  }
  .pillar.w .cat, .pillar.c .cat{color:var(--dark-body)}
  .pillar.r .cat{color:var(--responds-text)}
  .pillar p{
    margin:0;
    font-size:var(--t-sm);
    line-height:1.6;
  }
  .pillar.w p, .pillar.c p{color:var(--dark-body)}
  .pillar.r p{color:#1a1a1a}

  /* ===== PRO BLOCKS ===== */
  .pro{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:var(--r-md);
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .pro .bar{
    background:var(--blue);
    color:var(--white);
    padding:14px 16px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .pro .letter{
    font-family:var(--display);
    font-size:var(--t-lg);
    font-weight:700;
    line-height:1;
    letter-spacing:-.02em;
  }
  .pro .level{
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    color:var(--dark-sub);
    font-weight:500;
    text-transform:uppercase;
  }
  .pro .body{
    padding:16px 18px 20px;
  }
  .pro h4{
    margin:0 0 4px;
    font-family:var(--display);
    font-size:var(--t-base);
    font-weight:600;
    color:var(--ink);
  }
  .pro .q{
    font-style:italic;
    font-size:var(--t-sm);
    color:var(--sub);
    margin:0 0 10px;
    line-height:1.5;
  }
  .pro p{
    margin:0;
    font-size:var(--t-sm);
    line-height:1.6;
    color:var(--sub);
  }

  /* ===== PHASE CARDS ===== */
  .phase{
    background:var(--white);
    border:1px solid var(--line);
    border-radius:var(--r-md);
    padding:22px 22px 22px;
    position:relative;
    overflow:hidden;
  }
  .phase .big-num{
    position:absolute;
    right:14px;
    bottom:-10px;
    font-family:var(--display);
    font-size:96px;
    font-weight:700;
    color:#EDEFF2;
    line-height:1;
    letter-spacing:-.02em;
  }
  .phase .ph-label{
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:500;
    margin-bottom:8px;
  }
  .phase h3{
    font-family:var(--display);
    font-size:var(--t-lg);
    color:var(--ink);
    margin:0 0 8px;
    font-weight:700;
    line-height:1.25;
  }
  .phase p{
    margin:0 0 14px;
    font-size:var(--t-base);
    color:var(--sub);
    line-height:1.65;
    max-width:90%;
    position:relative;
    z-index:1;
  }

  /* ===== PRINCIPLE BANNER ===== */
  .principle{
    background:var(--blue);
    color:#fff;
    border-radius:4px;
    padding:20px 22px;
    margin:28px 0 40px;
  }
  .principle .q{
    font-size:17px;
    font-weight:700;
    margin:0 0 4px;
    letter-spacing:-.005em;
  }
  .principle .lbl{
    font-size:10.5px;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:rgba(255,255,255,.7);
    font-weight:600;
  }

  /* ===== LED METHOD ===== */
  .led-banner{
    display:flex;
    align-items:center;
    gap:18px;
    margin:8px 0 22px;
  }
  .led-banner .l{flex:1;height:1px;background:var(--line)}
  .led-banner .t{
    font-size:11px;
    letter-spacing:.22em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:700;
  }
  /* LED : three Moment surfaces from the design system.
     Base (white)  >  Pillar (gray, calm mid-surface)  >  Emphasis (blue) */
  .led-card{
    border-radius:var(--r-md);
    padding:22px 22px 24px;
    position:relative;
    min-height:340px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  /* Base : L */
  .led-card.base{
    background:var(--white);
    border:1px solid var(--line);
    color:var(--ink);
  }
  /* Pillar (mid) : E */
  .led-card.mid{
    background:var(--gray);
    border:1px solid var(--gray);
    color:var(--ink);
  }
  /* Emphasis : D */
  .led-card.emphasis{
    background:var(--blue);
    border:1px solid var(--blue);
    color:var(--dark-body);
  }

  .led-card .letter{
    font-family:var(--display);
    font-size:var(--t-xl);
    font-weight:700;
    line-height:1;
    letter-spacing:-.02em;
    margin:4px 0 14px;
    color:var(--ink);
  }
  .led-card.emphasis .letter{color:var(--white)}

  .led-card h4{
    margin:0 0 10px;
    font-family:var(--display);
    font-size:var(--t-lg);
    font-weight:700;
    line-height:1.25;
    color:var(--ink);
  }
  .led-card.emphasis h4{color:var(--white)}

  .led-card .desc{
    margin:0 0 16px;
    font-size:var(--t-base);
    line-height:1.65;
    color:var(--sub);
  }
  .led-card.emphasis .desc{color:var(--dark-body)}

  .pill{
    display:inline-block;
    font-size:var(--t-xs);
    font-weight:600;
    padding:6px 12px;
    border-radius:var(--r-sm);
    margin-bottom:14px;
    align-self:flex-start;
    letter-spacing:.02em;
  }
  .led-card.base .pill{background:#EAF1F8;color:var(--blue)}
  .led-card.mid  .pill{background:var(--white);color:var(--blue);border:1px solid var(--line)}
  .led-card.emphasis .pill{background:rgba(255,255,255,.12);color:var(--white);border:1px solid rgba(255,255,255,.25)}

  .led-list{
    list-style:none;
    padding:14px 0 0;
    margin:0;
    border-top:1px solid var(--line);
  }
  .led-card.mid .led-list{border-top-color:#DCDCDB}
  .led-card.emphasis .led-list{border-top-color:rgba(255,255,255,.18)}

  .led-list li{
    font-size:var(--t-sm);
    color:var(--sub);
    padding:7px 0;
    display:flex;
    gap:10px;
    align-items:center;
    line-height:1.5;
  }
  .led-card.emphasis .led-list li{color:var(--dark-body)}

  .led-list li::before{
    content:&quot;→&quot;;
    color:#9aa3ae;
    font-weight:500;
  }
  .led-card.emphasis .led-list li::before{color:var(--dark-sub)}

  /* ===== FOOTER ===== */
  footer{
    margin-top:56px;
    padding-top:20px;
    border-top:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    color:var(--sub);
    font-weight:500;
  }
  .marks{display:flex;gap:10px;align-items:center}
  .marks .sq{width:12px;height:12px;background:var(--welcomes)}
  .marks .ci{width:12px;height:12px;background:var(--connects);border-radius:50%}
  .marks .tr{
    width:0;height:0;
    border-left:7px solid transparent;
    border-right:7px solid transparent;
    border-bottom:12px solid var(--responds);
  }

  /* ===== DOC NAV (pages) ===== */
  .doc-nav{
    max-width:1040px;
    margin:0 auto;
    padding:28px 56px 0;
    display:flex;
    gap:4px;
    border-bottom:1px solid var(--line);
  }
  .nav-btn{
    background:transparent;
    border:none;
    cursor:pointer;
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    font-weight:500;
    color:var(--sub);
    padding:12px 16px;
    border-bottom:2px solid transparent;
    margin-bottom:-1px;
    transition:color 150ms ease-out, border-color 150ms ease-out;
  }
  .nav-btn:hover{color:var(--ink)}
  .nav-btn.active{
    color:var(--ink);
    font-weight:600;
    border-bottom-color:var(--ink);
  }
  .doc-page{display:none}
  .doc-page.active{display:block}

  /* ===== MODULE INDEX (page 2) =====
     Uses CSS subgrid so the header row and each P / R / O track row
     align horizontally across all three pillar columns. */
  .columns{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    grid-template-rows:auto auto auto auto;
    column-gap:20px;
    row-gap:0;
    align-items:start;
  }
  .pillar-col{
    display:grid;
    grid-template-rows:subgrid;
    grid-row:span 4;
    border:1px solid var(--line);
    border-radius:var(--r-md);
    overflow:hidden;
    background:var(--white);
  }
  .col-header{
    padding:20px 22px 22px;
    color:var(--white);
  }
  .pillar-col.w .col-header{background:var(--welcomes)}
  .pillar-col.c .col-header{background:var(--connects)}
  .pillar-col.r .col-header{background:var(--responds);color:#111}
  .col-header h3{
    font-family:var(--display);
    font-size:var(--t-lg);
    font-weight:700;
    margin:0 0 4px;
    line-height:1.2;
  }
  .col-sub{
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    font-weight:500;
    opacity:.88;
    display:block;
  }
  .col-count{
    font-family:var(--label);
    font-size:var(--t-xs);
    letter-spacing:.1em;
    text-transform:uppercase;
    font-weight:500;
    opacity:.72;
    display:block;

  <script>
    (function () {
      var tabs = document.querySelectorAll('.tab');
      var frames = document.querySelectorAll('.pillar-frame');
      var valid = ['framework','modules','welcomes','connects','responds'];

      function show(name) {
        tabs.forEach(function (t) {
          var active = t.dataset.tab === name;
          t.classList.toggle('active', active);
          t.setAttribute('aria-selected', active ? 'true' : 'false');
        });
        frames.forEach(function (f) {
          f.classList.toggle('active', f.dataset.frame === name);
        });
        if (history.replaceState) history.replaceState(null, '', '#' + name);
      }

      tabs.forEach(function (t) {
        t.addEventListener('click', function () { show(t.dataset.tab); });
      });

      var initial = (location.hash || '').replace('#', '');
      if (valid.indexOf(initial) !== -1) show(initial);
    })();
  </script>
